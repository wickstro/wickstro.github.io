{% if page.tag == "yellow" %}
<script>
	document.addEventListener("DOMContentLoaded", function () {
		new Snow("#sitewrapper", {
			number: 15,
			r: 8,
			v: 0.6,
			color: "rgb(255,223,23)",
			shape: '{{ page.shape | default: "sun" }}',
		});
	});
</script>
{% endif %} {% if page.tag == "pink" %}
